pde_type: poisson
dimension: 2

domain_2d:
  x_min: 0.0
  x_max: 1.0
  y_min: 0.0
  y_max: 1.0
  nx: 30
  ny: 30

boundary_conditions_2d:
  left:
    type: dirichlet
    value: 0.0
  right:
    type: dirichlet
    value: 0.0
  top:
    type: dirichlet
    value: 0.0
  bottom:
    type: robin
    value: 0.3
    robin_alpha: 5.0

source: "np.sin(np.pi * x) * np.sin(np.pi * y)"

solver:
  method: gauss_seidel
  max_iterations: 10000
  convergence_threshold: 1.0e-6
