pde_type: heat
dimension: 2
alpha: 1.0

domain_2d:
  x_min: 0.0
  x_max: 1.0
  y_min: 0.0
  y_max: 1.0
  nx: 100
  ny: 100

boundary_conditions_2d:
  left:
    type: robin
    value: 1.0
    robin_alpha: 20.0
  right:
    type: dirichlet
    value: 0.0
  top:
    type: dirichlet
    value: 0.0
  bottom:
    type: dirichlet
    value: 0.0

initial_condition:
  type: constant
  value: 0.0

time:
  dt: 0.0001
  t_max: 0.01

solver:
  method: explicit
  max_iterations: 10000
  convergence_threshold: 1.0e-6
