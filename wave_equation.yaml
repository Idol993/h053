pde_type: wave
dimension: 2
c: 1.0

domain_2d:
  x_min: 0.0
  x_max: 1.0
  y_min: 0.0
  y_max: 1.0
  nx: 100
  ny: 100

boundary_conditions_2d:
  left:
    type: dirichlet
    value: 0.0
  right:
    type: dirichlet
    value: 0.0
  top:
    type: dirichlet
    value: 0.0
  bottom:
    type: dirichlet
    value: 0.0

initial_condition:
  type: function
  expression: "np.sin(np.pi * x) * np.sin(np.pi * y)"

initial_velocity:
  type: constant
  value: 0.0

time:
  dt: 0.001
  t_max: 1.0

solver:
  method: auto
  max_iterations: 10000
  convergence_threshold: 1.0e-6
