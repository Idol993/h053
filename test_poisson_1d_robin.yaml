pde_type: poisson
dimension: 1

domain_1d:
  x_min: 0.0
  x_max: 1.0
  nx: 100

boundary_conditions_1d:
  left:
    type: robin
    value: 1.0
    robin_alpha: 5.0
  right:
    type: dirichlet
    value: 0.0

source: "np.sin(np.pi * x)"

solver:
  method: gauss_seidel
  max_iterations: 10000
  convergence_threshold: 1.0e-6
